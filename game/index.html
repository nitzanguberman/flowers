<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>משחק פרחים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', 'Segoe UI', Arial, sans-serif;
    background: #f0f7ee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    color: #1a1a1a;
    direction: rtl;
    text-align: right;
  }

  /* ── Login screen ── */
  #login-screen {
    display: none;
    width: 100%;
    max-width: 400px;
    margin-top: 80px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    padding: 40px 32px;
    text-align: center;
  }
  #login-screen h1 { font-size: 2rem; color: #2d6a4f; margin-bottom: 20px; }
  #user-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; width: 100%; }
  .user-btn {
    width: 100%;
    padding: 14px 16px;
    background: #f0f7ee;
    border: 2px solid #c8e6c9;
    border-radius: 12px;
    font-size: 1.1rem;
    font-family: inherit;
    color: #1b4332;
    cursor: pointer;
    text-align: right;
    direction: rtl;
    transition: background 0.15s, border-color 0.15s;
  }
  .user-btn:hover { background: #d4edda; border-color: #2d6a4f; }
  .user-btn { display: flex; justify-content: space-between; align-items: center; }
  .user-name { font-weight: bold; }
  .user-stats { font-size: 0.78rem; color: #555; font-weight: normal; direction: rtl; }
  #add-user-btn {
    width: 100%;
    padding: 11px;
    background: none;
    border: 2px dashed #aaa;
    border-radius: 12px;
    font-size: 0.95rem;
    font-family: inherit;
    color: #777;
    cursor: pointer;
    margin-top: 4px;
    transition: border-color 0.15s, color 0.15s;
  }
  #add-user-btn:hover { border-color: #2d6a4f; color: #2d6a4f; }
  #new-user-form { width: 100%; margin-bottom: 8px; }
  #login-screen input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #ddd;
    border-radius: 12px;
    font-size: 1.1rem;
    font-family: inherit;
    text-align: right;
    direction: rtl;
    margin-bottom: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  #login-screen input:focus { border-color: #2d6a4f; }
  #login-btn {
    width: 100%;
    padding: 12px;
    background: #2d6a4f;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  #login-btn:hover { background: #1b4332; }

  /* ── Header ── */
  header {
    width: 100%;
    max-width: 560px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .header-right { display: flex; align-items: center; gap: 10px; }
  h1 { font-size: 1.3rem; color: #2d6a4f; }
  #score-box {
    background: #2d6a4f;
    color: #fff;
    border-radius: 20px;
    padding: 4px 16px;
    font-size: 1rem;
    font-weight: bold;
  }
  #user-tag {
    font-size: 0.85rem;
    color: #555;
    display: flex;
    flex-direction: row-reverse;
    align-items: center;
    gap: 6px;
  }
  #switch-user {
    font-size: 0.75rem;
    color: #2d6a4f;
    cursor: pointer;
    text-decoration: underline;
    background: none;
    border: none;
    font-family: inherit;
  }

  /* ── Progress text ── */
  #progress {
    font-size: 0.85rem;
    color: #555;
    margin-bottom: 12px;
    text-align: right;
    width: 100%;
    max-width: 560px;
  }

  /* ── Game card ── */
  #card {
    width: 100%;
    max-width: 560px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    overflow: hidden;
  }
  #photo {
    width: 100%;
    height: 300px;
    object-fit: cover;
    display: block;
  }
  #question {
    padding: 14px 20px 4px;
    font-size: 1.05rem;
    font-weight: bold;
    color: #2d6a4f;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #box-badge {
    font-size: 0.75rem;
    background: #e8f5e0;
    color: #2d6a4f;
    border-radius: 10px;
    padding: 2px 8px;
    font-weight: normal;
  }

  /* ── Choices ── */
  #choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 12px 20px 16px;
    direction: rtl;
  }
  .choice {
    background: #f8f8f8;
    border: 2px solid #ddd;
    border-radius: 12px;
    padding: 12px;
    cursor: pointer;
    text-align: center;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    user-select: none;
  }
  .choice:hover:not(.disabled) { border-color: #2d6a4f; background: #e8f5e0; transform: scale(1.02); }
  .choice .he { font-size: 1.05rem; font-weight: bold; direction: rtl; }
  .choice .en { font-size: 0.75rem; color: #888; margin-top: 3px; direction: ltr; }
  .choice.correct { background: #d4edda; border-color: #28a745; }
  .choice.wrong   { background: #f8d7da; border-color: #dc3545; }
  .choice.reveal  { background: #d4edda; border-color: #28a745; }
  .choice.disabled { cursor: default; }

  /* ── Info box ── */
  #info-box {
    display: none;
    margin: 0 20px 12px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #c8e6c9;
    background: #f0f7ee;
  }
  #info-img { width: 100%; max-height: 180px; object-fit: cover; display: block; }
  #info-text {
    padding: 10px 14px;
    font-size: 0.88rem;
    color: #333;
    line-height: 1.6;
    text-align: right;
    direction: rtl;
    border-right: 4px solid #2d6a4f;
  }

  /* ── Next button ── */
  #next-btn {
    display: none;
    margin: 0 20px 20px;
    width: calc(100% - 40px);
    padding: 12px;
    background: #2d6a4f;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  #next-btn:hover { background: #1b4332; }

  /* ── Summary screen ── */
  #summary {
    display: none;
    width: 100%;
    max-width: 560px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    padding: 32px 24px;
    text-align: center;
  }
  #summary h2 { font-size: 1.8rem; color: #2d6a4f; margin-bottom: 6px; }
  #summary .final-score { font-size: 2.8rem; font-weight: bold; color: #1b4332; margin: 12px 0; }
  #summary p { color: #555; margin-bottom: 20px; }

  .progress-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 24px;
    font-size: 0.9rem;
    direction: rtl;
    text-align: right;
  }
  .progress-table th {
    background: #e8f5e0;
    color: #2d6a4f;
    padding: 8px 12px;
    font-weight: bold;
  }
  .progress-table td { padding: 7px 12px; border-bottom: 1px solid #eee; }
  .progress-table tr:last-child td { border-bottom: none; }
  .box-dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    margin-left: 6px;
  }

  #restart-btn {
    padding: 12px 32px;
    background: #2d6a4f;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
  }
  #restart-btn:hover { background: #1b4332; }

  /* ── Loading / error ── */
  #loading { margin-top: 60px; font-size: 1.2rem; color: #2d6a4f; }
  #error {
    display: none;
    margin-top: 60px;
    color: #dc3545;
    text-align: center;
    max-width: 400px;
  }

  /* ── Report modal ── */
  #report-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    justify-content: center;
    align-items: flex-start;
    padding: 24px 16px;
    overflow-y: auto;
  }
  #report-overlay.open { display: flex; }
  #report-box {
    background: #fff;
    border-radius: 20px;
    width: 100%;
    max-width: 520px;
    padding: 28px 24px;
    direction: rtl;
  }
  #report-box h2 { font-size: 1.4rem; color: #2d6a4f; margin-bottom: 4px; }
  #report-box .report-meta { font-size: 0.85rem; color: #777; margin-bottom: 20px; }
  #report-close {
    float: left;
    background: none;
    border: none;
    font-size: 1.4rem;
    cursor: pointer;
    color: #aaa;
    line-height: 1;
  }
  #report-close:hover { color: #333; }
  .report-section { margin-bottom: 18px; }
  .report-section h3 { font-size: 0.85rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .report-flower-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 0.9rem;
  }
  .report-flower-row:last-child { border-bottom: none; }
  .report-flower-name { flex: 1; }
  .report-flower-acc { color: #888; font-size: 0.8rem; margin-left: 10px; }
  .report-btn {
    background: none;
    border: none;
    font-size: 0.85rem;
    cursor: pointer;
    color: #2d6a4f;
    padding: 2px 6px;
    opacity: 0.7;
    flex-shrink: 0;
  }
  .report-btn:hover { opacity: 1; }
</style>
</head>
<body>

<div id="loading">טוען פרחים... 🌸</div>
<div id="error"></div>

<!-- Report modal -->
<div id="report-overlay">
  <div id="report-box">
    <button id="report-close">✕</button>
    <h2 id="report-username"></h2>
    <div class="report-meta" id="report-meta"></div>
    <div id="report-sections"></div>
  </div>
</div>

<!-- Login -->
<div id="login-screen">
  <h1>🌸 משחק פרחים</h1>
  <div id="user-list"></div>
  <div id="new-user-form" style="display:none">
    <input id="name-input" type="text" placeholder="השם שלך" maxlength="30">
    <button id="login-btn">כניסה</button>
  </div>
  <button id="add-user-btn">+ משתמש חדש</button>
</div>

<!-- Game -->
<header id="header" style="display:none">
  <div class="header-right">
    <h1>🌸 משחק פרחים</h1>
    <div id="user-tag">
      <span id="username-label"></span>
      <button id="switch-user">שנה</button>
    </div>
  </div>
  <div id="score-box">ניקוד: <span id="score">0</span></div>
</header>

<div id="progress" style="display:none"></div>

<div id="card" style="display:none">
  <img id="photo" src="" alt="פרח">
  <div id="question">
    <span>איזה פרח זה?</span>
    <span id="box-badge"></span>
  </div>
  <div id="choices"></div>
  <div id="info-box">
    <img id="info-img" src="" alt="">
    <div id="info-text"></div>
  </div>
  <button id="next-btn">הבא ◀</button>
</div>

<!-- Summary -->
<div id="summary">
  <h2>סיום! 🎉</h2>
  <div class="final-score"><span id="final-score"></span></div>
  <p id="summary-text"></p>
  <table class="progress-table" id="progress-table">
    <tr>
      <th>קופסה</th>
      <th>פרחים</th>
      <th>מתי חוזר</th>
    </tr>
  </table>
  <button id="restart-btn">סשן נוסף</button>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyChw-uXFymNKrZIVOE2DZbVtGBfuQOpcn4",
  authDomain: "flowers-game-5e085.firebaseapp.com",
  projectId: "flowers-game-5e085",
  storageBucket: "flowers-game-5e085.firebasestorage.app",
  messagingSenderId: "851425514637",
  appId: "1:851425514637:web:04a2009058dda3d9ae3ec4"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

async function loadUserData(name) {
  const snap = await getDoc(doc(db, 'users', name));
  return snap.exists() ? snap.data() : { sessionCount: 0, flowers: {} };
}
async function saveUserData(name, userData) {
  await setDoc(doc(db, 'users', name), userData);
}

const USER_KEY   = 'flowers_current_user';
const BOX_COLORS = ['#dc3545','#fd7e14','#ffc107','#20c997','#2d6a4f'];
const BOX_LABELS = ['כל סשן','כל 2 סשנים','כל 4 סשנים','כל 8 סשנים','כל 16 סשנים'];
const BOX_NAMES  = ['חדש','מתחיל','מכיר','טוב','שולט!'];

let allFlowers    = [];
let sessionQueue  = [];
let currentIdx    = 0;
let sessionScore  = 0;
let currentUser   = null;
let currentUserData = null;

function getFlowerState(userData, file) {
  if (!userData.flowers[file]) {
    userData.flowers[file] = { box: 1, lastSession: -999, correct: 0, total: 0 };
  }
  return userData.flowers[file];
}

function isDue(state, sessionCount) {
  const interval = Math.pow(2, state.box - 1);
  return (sessionCount - state.lastSession) >= interval;
}

function buildSessionQueue(userData) {
  const sc = userData.sessionCount;
  let due = allFlowers.filter(f => isDue(getFlowerState(userData, f.file), sc));

  if (due.length < 4) {
    const notDue = allFlowers
      .filter(f => !due.includes(f))
      .sort((a, b) => {
        const sa = getFlowerState(userData, a.file);
        const sb = getFlowerState(userData, b.file);
        return sa.box - sb.box || (sc - sb.lastSession) - (sc - sa.lastSession);
      });
    due = due.concat(notDue.slice(0, 4 - due.length));
  }
  return shuffle([...due]);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function getOptions(correct) {
  const pool = allFlowers.filter(f => f !== correct);
  shuffle(pool);
  return shuffle([...pool.slice(0, 3), correct]);
}

function showReport(username, data) {
  const flowers = data.flowers || {};
  const sessions = data.sessionCount || 0;

  document.getElementById('report-username').textContent = username;
  document.getElementById('report-meta').textContent =
    `${sessions} סשנים · ${Object.keys(flowers).length} פרחים נראו`;

  // Group flowers by box, using allFlowers for Hebrew names
  const byBox = {1:[], 2:[], 3:[], 4:[], 5:[]};
  allFlowers.forEach(f => {
    const s = flowers[f.file];
    if (!s) return;
    byBox[s.box].push({ name: f.name_he, correct: s.correct, total: s.total, box: s.box });
  });

  const sections = document.getElementById('report-sections');
  sections.innerHTML = '';
  [5,4,3,2,1].forEach(box => {
    const items = byBox[box];
    if (!items.length) return;
    const sec = document.createElement('div');
    sec.className = 'report-section';
    sec.innerHTML = `<h3><span class="box-dot" style="background:${BOX_COLORS[box-1]}"></span>${BOX_NAMES[box-1]} — קופסה ${box}</h3>`;
    items.forEach(item => {
      const pct = item.total ? Math.round((item.correct / item.total) * 100) : 0;
      const row = document.createElement('div');
      row.className = 'report-flower-row';
      row.innerHTML = `
        <span class="report-flower-name">${item.name}</span>
        <span class="report-flower-acc">${item.correct}/${item.total} (${pct}%)</span>
      `;
      sec.appendChild(row);
    });
    sections.appendChild(sec);
  });

  document.getElementById('report-overlay').classList.add('open');
}

document.getElementById('report-close').addEventListener('click', () => {
  document.getElementById('report-overlay').classList.remove('open');
});
document.getElementById('report-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('report-overlay'))
    document.getElementById('report-overlay').classList.remove('open');
});

async function showLogin() {
  const screen = document.getElementById('login-screen');
  screen.style.display = 'block';

  const list = document.getElementById('user-list');
  list.innerHTML = '<div style="color:#aaa;font-size:0.9rem;padding:8px 0">טוען משתמשים...</div>';

  const snap = await getDocs(collection(db, 'users'));
  list.innerHTML = '';
  snap.docs
    .sort((a, b) => a.id.localeCompare(b.id))
    .forEach(d => {
      const data = d.data();
      const flowers = data.flowers || {};
      const mastered = Object.values(flowers).filter(f => f.box === 5).length;
      const total    = Object.values(flowers).length;
      const sessions = data.sessionCount || 0;

      const row = document.createElement('div');
      row.style.cssText = 'display:flex;gap:8px;align-items:stretch;';

      const btn = document.createElement('button');
      btn.className = 'user-btn';
      btn.style.flex = '1';
      btn.innerHTML = `
        <span class="user-name">${d.id}</span>
        <span class="user-stats">${sessions} סשנים · ${mastered}/${total} שולט!</span>
      `;
      btn.addEventListener('click', () => doLogin(d.id).catch(console.error));

      const reportBtn = document.createElement('button');
      reportBtn.className = 'report-btn';
      reportBtn.title = 'דוח מפורט';
      reportBtn.textContent = '📊';
      reportBtn.style.cssText = 'border:2px solid #c8e6c9;border-radius:12px;background:#f0f7ee;padding:0 12px;font-size:1.1rem;cursor:pointer;';
      reportBtn.addEventListener('click', () => showReport(d.id, d.data()));

      row.appendChild(btn);
      row.appendChild(reportBtn);
      list.appendChild(row);
    });
}

document.getElementById('add-user-btn').addEventListener('click', () => {
  const form = document.getElementById('new-user-form');
  form.style.display = 'block';
  document.getElementById('add-user-btn').style.display = 'none';
  document.getElementById('name-input').focus();
});

async function doLogin(name) {
  name = name.trim();
  if (!name) return;
  localStorage.setItem(USER_KEY, name);
  currentUser = name;
  document.getElementById('login-screen').style.display = 'none';
  await startSession();
}

document.getElementById('login-btn').addEventListener('click', () => {
  doLogin(document.getElementById('name-input').value).catch(console.error);
});
document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin(document.getElementById('name-input').value).catch(console.error);
});
document.getElementById('switch-user').addEventListener('click', () => {
  localStorage.removeItem(USER_KEY);
  document.getElementById('header').style.display = 'none';
  document.getElementById('card').style.display = 'none';
  document.getElementById('progress').style.display = 'none';
  document.getElementById('summary').style.display = 'none';
  document.getElementById('name-input').value = '';
  document.getElementById('new-user-form').style.display = 'none';
  document.getElementById('add-user-btn').style.display = 'block';
  showLogin().catch(console.error);
});

async function startSession() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('loading').textContent = 'טוען נתוני משתמש... 🌸';

  currentUserData = await loadUserData(currentUser);
  currentUserData.sessionCount++;
  await saveUserData(currentUser, currentUserData);

  sessionQueue = buildSessionQueue(currentUserData);
  currentIdx = 0;
  sessionScore = 0;

  document.getElementById('loading').style.display = 'none';
  document.getElementById('username-label').textContent = currentUser;
  document.getElementById('score').textContent = '0';
  document.getElementById('header').style.display = 'flex';
  document.getElementById('progress').style.display = 'block';
  document.getElementById('card').style.display = 'block';
  document.getElementById('summary').style.display = 'none';
  showQuestion();
}

function showQuestion() {
  const flower = sessionQueue[currentIdx];
  const state  = getFlowerState(currentUserData, flower.file);

  document.getElementById('photo').src = '../' + flower.file;
  document.getElementById('progress').textContent =
    `שאלה ${currentIdx + 1} מתוך ${sessionQueue.length}`;
  document.getElementById('box-badge').textContent = `${BOX_NAMES[state.box - 1]} (רמה ${state.box}/5)`;
  document.getElementById('box-badge').style.background = BOX_COLORS[state.box - 1] + '22';
  document.getElementById('box-badge').style.color = BOX_COLORS[state.box - 1];

  const options = getOptions(flower);
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('div');
    btn.className = 'choice';
    btn.innerHTML = `<div class="he">${opt.name_he}</div><div class="en">${opt.name_en}</div>`;
    btn.addEventListener('click', () => handleAnswer(btn, opt, flower));
    choicesEl.appendChild(btn);
  });

  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('info-box').style.display = 'none';
}

function handleAnswer(btn, chosen, correct) {
  document.querySelectorAll('.choice').forEach(b => b.classList.add('disabled'));

  const isCorrect = chosen === correct;

  if (isCorrect) {
    btn.classList.add('correct');
    sessionScore++;
    document.getElementById('score').textContent = sessionScore;
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.choice').forEach(b => {
      if (b.querySelector('.he').textContent === correct.name_he) b.classList.add('reveal');
    });
  }

  const state = getFlowerState(currentUserData, correct.file);
  state.total++;
  if (isCorrect) {
    state.correct++;
    state.box = Math.min(state.box + 1, 5);
  } else {
    state.box = 1;
  }
  state.lastSession = currentUserData.sessionCount;

  saveUserData(currentUser, currentUserData).catch(console.error);

  const infoBox = document.getElementById('info-box');
  if (correct.info || correct.photo_url) {
    document.getElementById('info-text').textContent = correct.info || '';
    document.getElementById('info-text').style.display = correct.info ? 'block' : 'none';
    const infoImg = document.getElementById('info-img');
    if (correct.photo_url) {
      infoImg.src = correct.photo_url;
      infoImg.style.display = 'block';
    } else {
      infoImg.style.display = 'none';
    }
    infoBox.style.display = 'block';
  } else {
    infoBox.style.display = 'none';
  }

  document.getElementById('next-btn').style.display = 'block';
}

document.getElementById('next-btn').addEventListener('click', () => {
  currentIdx++;
  if (currentIdx >= sessionQueue.length) showSummary();
  else showQuestion();
});

function showSummary() {
  document.getElementById('card').style.display = 'none';
  document.getElementById('progress').style.display = 'none';

  const total = sessionQueue.length;
  const pct = Math.round((sessionScore / total) * 100);
  document.getElementById('final-score').textContent = `${sessionScore} / ${total}`;
  document.getElementById('summary-text').textContent =
    pct === 100 ? 'מושלם! אתה מומחה פרחים! 🌟' :
    pct >= 70  ? 'כל הכבוד! עשית עבודה נהדרת 🌻' :
    pct >= 40  ? 'לא רע! כדאי להתאמן עוד קצת 🌱' :
                 'המשך להתאמן, אתה תשתפר! 💪';

  const boxCounts = [0, 0, 0, 0, 0];
  allFlowers.forEach(f => {
    const s = getFlowerState(currentUserData, f.file);
    boxCounts[s.box - 1]++;
  });

  const table = document.getElementById('progress-table');
  while (table.rows.length > 1) table.deleteRow(1);
  boxCounts.forEach((count, i) => {
    if (count === 0) return;
    const row = table.insertRow();
    row.innerHTML = `
      <td><span class="box-dot" style="background:${BOX_COLORS[i]}"></span>קופסה ${i + 1}</td>
      <td>${count} פרחים</td>
      <td>${BOX_LABELS[i]}</td>`;
  });

  document.getElementById('summary').style.display = 'block';
}

document.getElementById('restart-btn').addEventListener('click', () => {
  startSession().catch(console.error);
});

(async () => {
  try {
    const resp = await fetch('../flowers.json');
    if (!resp.ok) throw new Error('לא ניתן לטעון את flowers.json');
    allFlowers = await resp.json();
    if (allFlowers.length < 4) throw new Error('צריך לפחות 4 פרחים כדי לשחק');

    document.getElementById('loading').style.display = 'none';

    const saved = localStorage.getItem(USER_KEY);
    if (saved) {
      currentUser = saved;
      await startSession();
    } else {
      await showLogin();
    }
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    const errEl = document.getElementById('error');
    errEl.style.display = 'block';
    errEl.innerHTML = `<strong>שגיאה:</strong> ${e.message}`;
  }
})();
</script>
