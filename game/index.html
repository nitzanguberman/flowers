<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>משחק פרחים</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>

  body {
    font-family: 'Heebo', 'Segoe UI', Arial, sans-serif;
    background: #f3f8f1;

    display: flex;

    align-items: center;

  /* ── Login screen ── */

    display: none;

  .user-btn {
    width: 100%;
    padding: 14px 16px;
    background: #f0f7ee;
    border: 2px solid #c8e6c9;

  #add-user-btn {

  #new-user-form { width: 100%; margin-bottom: 8px; }
  #login-screen input {

    padding: 12px 16px;
    border: 2px solid #ddd;
    border-radius: 12px;
    font-size: 1.1rem;
    font-family: inherit;
    text-align: right;

    transition: border-color 0.15s;
  }
  #login-screen input:focus { border-color: #2d6a4f; }
  #login-btn {

    padding: 12px;
    background: #2d6a4f;
    color: #fff;

    border-radius: 12px;

  /* ── Header ── */
  header {

    background: #fff;
    border-radius: 18px;

  #choices {

    border: 2px dashed #aaa;
    border-radius: 12px;
    font-size: 0.95rem;
    font-family: inherit;

  /* ── Home button ── */
/* ── Loading / error ── */
  #loading { margin-top: 60px; font-size: 1.2rem; color: #2d6a4f; }

    display: none;
    margin-top: 60px;

    display: none;
    position: fixed;

    background: rgba(0,0,0,0.45);

  .report-flower-row {
    display: flex;

  .report-btn {
    background: none;

    font-size: 0.85rem;

  @media (max-width: 640px) {

    .choice {

      padding: 11px 12px;
    }
    .choice .he { font-size: 1.02rem; }
    .choice .en { font-size: 0.88rem; }

<body>

<!-- Game -->
<header id="header" style="display:none">
  <div class="header-main">

    </div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
import { firebaseConfig } from './firebase-config.js';

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

async function loadUserData(name) {
  const snap = await getDoc(doc(db, 'users', name));
  if (!snap.exists()) return { collections: {}, lastCollection: null };
  const data = snap.data();
  // Migrate old format: { sessionCount, flowers } → { collections: { flowers1: ... } }
  if (data.flowers && !data.collections) {
    return {
      collections: { flowers1: { sessionCount: data.sessionCount || 0, flowers: data.flowers } },
      lastCollection: 'flowers1'
    };
  }
  if (!data.collections) data.collections = {};
  return data;
}

async function saveUserData(name, userData) {
  await setDoc(doc(db, 'users', name), userData);
}

const USER_KEY   = 'flowers_current_user';
const BOX_COLORS = ['#dc3545','#fd7e14','#ffc107','#20c997','#2d6a4f'];
const BOX_LABELS = ['כל משחק','כל 2 משחקים','כל 4 משחקים','כל 8 משחקים','כל 16 משחקים'];
const BOX_NAMES  = ['חדש','מתחיל','מכיר','טוב','שולט!'];
const PHOTO_PLACEHOLDER = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450"%3E%3Crect width="800" height="450" fill="%23f0f7ee"/%3E%3Ctext x="400" y="230" text-anchor="middle" font-family="Arial,sans-serif" font-size="34" fill="%232d6a4f"%3EPhoto unavailable%3C/text%3E%3C/svg%3E';

let allCollections  = [];
let currentCollection = null;
let allFlowers      = [];
let sessionQueue    = [];
let currentIdx      = 0;
let sessionScore    = 0;
let currentUser     = null;
let currentUserData = null;

function getCollectionState(userData) {
  const id = currentCollection.id;
  if (!userData.collections[id]) {
    userData.collections[id] = { sessionCount: 0, flowers: {} };
  }
  return userData.collections[id];
}

function getFlowerState(userData, file) {
  const col = getCollectionState(userData);
  if (!col.flowers[file]) {
    col.flowers[file] = { box: 1, lastSession: -999, correct: 0, total: 0 };
  }
  return col.flowers[file];
}

function isDue(state, sessionCount) {
  const interval = Math.pow(2, state.box - 1);
  return (sessionCount - state.lastSession) >= interval;
}

function buildSessionQueue(userData) {
  const sc = getCollectionState(userData).sessionCount;
  let due = allFlowers.filter(f => isDue(getFlowerState(userData, f.file), sc));

  if (due.length < 4) {
    const notDue = allFlowers
      .filter(f => !due.includes(f))
      .sort((a, b) => {
        const sa = getFlowerState(userData, a.file);
        const sb = getFlowerState(userData, b.file);
        return sa.box - sb.box || (sc - sb.lastSession) - (sc - sa.lastSession);
      });
    due = due.concat(notDue.slice(0, 4 - due.length));
  }
  return shuffle([...due]);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function answerKey(flower) {
  return (flower.name_he || flower.name_en || flower.sci_name || '').trim();
}

function getOptions(correct) {
  const correctKey = answerKey(correct);
  const uniquePool = new Map();

  shuffle([...allFlowers]).forEach(flower => {
    const key = answerKey(flower);
    if (!key || key === correctKey || uniquePool.has(key)) return;
    uniquePool.set(key, flower);
  });

  return shuffle([...Array.from(uniquePool.values()).slice(0, 3), correct]);
}

function setQuestionPhoto(flower) {
  const photo = document.getElementById('photo');
  const localSrc = '../' + flower.file;
  const fallbackSrc = flower.photo_url || PHOTO_PLACEHOLDER;

  photo.onerror = () => {
    photo.onerror = () => {
      photo.onerror = null;
      photo.src = PHOTO_PLACEHOLDER;
    };
    photo.src = fallbackSrc;
  };
  photo.src = localSrc;
}

function collectionsDataFrom(raw) {
  if (raw.collections) return raw.collections;
  if (raw.flowers) return { flowers1: { sessionCount: raw.sessionCount || 0, flowers: raw.flowers } };
  return {};
}

function showReport(username, data) {
  document.getElementById('report-username').textContent = username;
  const sections = document.getElementById('report-sections');
  sections.innerHTML = '';

  if (currentCollection && allFlowers.length > 0) {
    // In-game: detailed per-flower report for current collection
    const colData = (data.collections || {})[currentCollection.id] || { sessionCount: 0, flowers: {} };
    const flowers  = colData.flowers;
    document.getElementById('report-meta').textContent =
      `${colData.sessionCount || 0} משחקים · ${Object.keys(flowers).length} פרחים נראו · ${currentCollection.name}`;

    const byBox = {1:[], 2:[], 3:[], 4:[], 5:[]};
    allFlowers.forEach(f => {
      const s = flowers[f.file];
      if (!s) return;
      byBox[s.box].push({ name: f.name_he, correct: s.correct, total: s.total });
    });
    [5,4,3,2,1].forEach(box => {
      const items = byBox[box];
      if (!items.length) return;
      const sec = document.createElement('div');
      sec.className = 'report-section';
      sec.innerHTML = `<h3><span class="box-dot" style="background:${BOX_COLORS[box-1]}"></span>${BOX_NAMES[box-1]} — קופסה ${box}</h3>`;
      items.forEach(item => {
        const pct = item.total ? Math.round((item.correct / item.total) * 100) : 0;
        const row = document.createElement('div');
        row.className = 'report-flower-row';
        row.innerHTML = `<span class="report-flower-name">${item.name}</span>
          <span class="report-flower-acc">${item.correct}/${item.total} (${pct}%)</span>`;
        sec.appendChild(row);
      });
      sections.appendChild(sec);
    });
  } else {
    // Login screen: summary per collection
    const cols = collectionsDataFrom(data);
    const total = Object.values(cols).reduce((s, c) => s + (c.sessionCount || 0), 0);
    document.getElementById('report-meta').textContent = `${total} משחקים סה"כ`;
    allCollections.forEach(col => {
      const colData = cols[col.id];
      if (!colData) return;
      const flowers  = colData.flowers || {};
      const mastered = Object.values(flowers).filter(f => f.box === 5).length;
      const sec = document.createElement('div');
      sec.className = 'report-section';
      sec.innerHTML = `<h3>${col.name}</h3>
        <div style="font-size:0.9rem;color:#555;padding:4px 0">${colData.sessionCount || 0} משחקים · ${mastered}/${Object.keys(flowers).length} שולט!</div>`;
      sections.appendChild(sec);
    });
  }

  document.getElementById('report-overlay').classList.add('open');
}

document.getElementById('report-close').addEventListener('click', () => {
  document.getElementById('report-overlay').classList.remove('open');
});
document.getElementById('report-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('report-overlay'))
    document.getElementById('report-overlay').classList.remove('open');
});

function resetToLogin() {
  localStorage.removeItem(USER_KEY);
  currentUser = null;
  currentUserData = null;
  currentCollection = null;
  ['header', 'card', 'progress', 'summary', 'collection-screen'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
  document.getElementById('name-input').value = '';
  document.getElementById('new-user-form').style.display = 'none';
  document.getElementById('add-user-btn').style.display = 'block';
}

async function showLogin() {
  document.getElementById('login-screen').style.display = 'block';

  const list = document.getElementById('user-list');
  list.innerHTML = '<div style="color:#aaa;font-size:0.9rem;padding:8px 0">טוען משתמשים...</div>';

  const snap = await getDocs(collection(db, 'users'));
  list.innerHTML = '';
  snap.docs
    .sort((a, b) => a.id.localeCompare(b.id))
    .forEach(d => {
      const cols = collectionsDataFrom(d.data());
      const totalSessions = Object.values(cols).reduce((s, c) => s + (c.sessionCount || 0), 0);
      const allFlowersSeen = new Set(Object.values(cols).flatMap(c => Object.keys(c.flowers || {})));
      const allMastered    = Object.values(cols).reduce((s, c) =>
        s + Object.values(c.flowers || {}).filter(f => f.box === 5).length, 0);

      const row = document.createElement('div');
      row.style.cssText = 'display:flex;gap:8px;align-items:stretch;';

      const btn = document.createElement('button');
      btn.className = 'user-btn';
      btn.style.cssText = 'flex:1;width:auto;';
      btn.innerHTML = `
        <span class="user-name">${d.id}</span>
        <span class="user-stats">${totalSessions} משחקים · ${allMastered}/${allFlowersSeen.size} שולט!</span>
      `;
      btn.addEventListener('click', () => doLogin(d.id).catch(console.error));

      const reportBtn = document.createElement('button');
      reportBtn.className = 'report-btn';
      reportBtn.title = 'דוח מפורט';
      reportBtn.textContent = '📊';
      reportBtn.style.cssText = 'border:2px solid #c8e6c9;border-radius:12px;background:#f0f7ee;padding:0 12px;font-size:1.1rem;cursor:pointer;';
      reportBtn.addEventListener('click', () => showReport(d.id, d.data()));

      row.appendChild(btn);
      row.appendChild(reportBtn);
      list.appendChild(row);
    });
}

document.getElementById('add-user-btn').addEventListener('click', () => {
  document.getElementById('new-user-form').style.display = 'block';
  document.getElementById('add-user-btn').style.display = 'none';
  document.getElementById('name-input').focus();
});

async function doLogin(name) {
  name = name.trim();
  if (!name) return;
  localStorage.setItem(USER_KEY, name);
  currentUser = name;
  document.getElementById('login-screen').style.display = 'none';
  currentUserData = await loadUserData(currentUser);
  showCollectionPicker();
}

document.getElementById('login-btn').addEventListener('click', () => {
  doLogin(document.getElementById('name-input').value).catch(console.error);
});
document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin(document.getElementById('name-input').value).catch(console.error);
});
document.getElementById('report-user').addEventListener('click', () => {
  showReport(currentUser, currentUserData);
});
document.getElementById('change-collection').addEventListener('click', () => {
  ['header', 'card', 'progress', 'summary'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
  showCollectionPicker();
});
document.getElementById('switch-user').addEventListener('click', () => {
  resetToLogin();
  showLogin().catch(console.error);
});
document.getElementById('switch-user-from-collection').addEventListener('click', () => {
  resetToLogin();
  showLogin().catch(console.error);
});

function showCollectionPicker() {
  document.getElementById('collection-screen').style.display = 'block';
  document.getElementById('collection-welcome').textContent = `שלום, ${currentUser}! בחר אוסף:`;

  const lastCol = currentUserData ? currentUserData.lastCollection : null;
  const list = document.getElementById('collection-list');
  list.innerHTML = '';
  allCollections.forEach(col => {
    const isLast = col.id === lastCol;
    const btn = document.createElement('button');
    btn.className = 'collection-btn' + (isLast ? ' last-used' : '');
    btn.textContent = col.name + (isLast ? ' ★' : '');
    btn.addEventListener('click', () => {
      currentCollection = col;
      document.getElementById('collection-screen').style.display = 'none';
      startSession().catch(err => {
        document.getElementById('loading').style.display = 'none';
        showCollectionPicker();
        document.getElementById('collection-welcome').textContent = `שגיאה: ${err.message}`;
        document.getElementById('collection-welcome').style.color = '#dc3545';
      });
    });
    list.appendChild(btn);
  });
}

async function startSession() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('loading').textContent = 'טוען... 🌸';

  const resp = await fetch('../' + currentCollection.file);
  if (!resp.ok) throw new Error('לא ניתן לטעון את האוסף');
  allFlowers = await resp.json();
  if (allFlowers.length < 4) throw new Error('צריך לפחות 4 פרחים כדי לשחק');

  currentUserData = await loadUserData(currentUser);
  currentUserData.lastCollection = currentCollection.id;
  const colState = getCollectionState(currentUserData);
  colState.sessionCount++;
  await saveUserData(currentUser, currentUserData);

  sessionQueue = buildSessionQueue(currentUserData);
  currentIdx   = 0;
  sessionScore = 0;

  document.getElementById('loading').style.display = 'none';
  document.getElementById('username-label').textContent = `${currentUser} · ${currentCollection.name}`;
  document.getElementById('score').textContent = '0';
  document.getElementById('header').style.display = 'flex';
  document.getElementById('progress').style.display = 'block';
  document.getElementById('card').style.display = 'block';
  document.getElementById('summary').style.display = 'none';
  showQuestion();
}

function showQuestion() {
  const flower = sessionQueue[currentIdx];
  const state  = getFlowerState(currentUserData, flower.file);

  setQuestionPhoto(flower);
  document.getElementById('progress').textContent =
    `שאלה ${currentIdx + 1} מתוך ${sessionQueue.length}`;
  document.getElementById('box-badge').textContent = `${BOX_NAMES[state.box - 1]} (רמה ${state.box}/5)`;
  document.getElementById('box-badge').style.background = BOX_COLORS[state.box - 1] + '22';
  document.getElementById('box-badge').style.color = BOX_COLORS[state.box - 1];

  const options = getOptions(flower);
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'choice';
    btn.dataset.answerKey = answerKey(opt);
    btn.innerHTML = `<div class="he">${opt.name_he}</div><div class="en">${opt.name_en}</div>`;
    btn.addEventListener('click', () => handleAnswer(btn, opt, flower));
    choicesEl.appendChild(btn);
  });

  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('info-box').style.display = 'none';
}

function handleAnswer(btn, chosen, correct) {
  document.querySelectorAll('.choice').forEach(b => {
    b.classList.add('disabled');
    b.disabled = true;
  });

  const isCorrect = chosen === correct;

  if (isCorrect) {
    btn.classList.add('correct');
    sessionScore++;
    document.getElementById('score').textContent = sessionScore;
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.choice').forEach(b => {
      if (b.dataset.answerKey === answerKey(correct)) b.classList.add('reveal');
    });
  }

  const state = getFlowerState(currentUserData, correct.file);
  state.total++;
  if (isCorrect) {
    state.correct++;
    state.box = Math.min(state.box + 1, 5);
  } else {
    state.box = 1;
  }
  state.lastSession = getCollectionState(currentUserData).sessionCount;

  saveUserData(currentUser, currentUserData).catch(console.error);

  const infoBox = document.getElementById('info-box');
  if (correct.info || correct.photo_url) {
    document.getElementById('info-text').textContent = correct.info || '';
    document.getElementById('info-text').style.display = correct.info ? 'block' : 'none';
    const infoImg = document.getElementById('info-img');
    if (correct.photo_url) {
      infoImg.src = correct.photo_url;
      infoImg.style.display = 'block';
    } else {
      infoImg.style.display = 'none';
    }
    infoBox.style.display = 'block';
  } else {
    infoBox.style.display = 'none';
  }

  document.getElementById('next-btn').style.display = 'block';
}

document.getElementById('next-btn').addEventListener('click', () => {
  currentIdx++;
  if (currentIdx >= sessionQueue.length) showSummary();
  else showQuestion();
});

function showSummary() {
  document.getElementById('card').style.display = 'none';
  document.getElementById('progress').style.display = 'none';

  const total = sessionQueue.length;
  const pct = Math.round((sessionScore / total) * 100);
  document.getElementById('final-score').textContent = `${sessionScore} / ${total}`;
  document.getElementById('summary-text').textContent =
    pct === 100 ? 'מושלם! אתה מומחה פרחים! 🌟' :
    pct >= 70  ? 'כל הכבוד! עשית עבודה נהדרת 🌻' :
    pct >= 40  ? 'לא רע! כדאי להתאמן עוד קצת 🌱' :
               'המשך להתאמן, אתה תשתפר! 💪';

  const boxCounts = [0, 0, 0, 0, 0];
  allFlowers.forEach(f => {
    const s = getFlowerState(currentUserData, f.file);
    boxCounts[s.box - 1]++;
  });

  const table = document.getElementById('progress-table');
  while (table.rows.length > 1) table.deleteRow(1);
  boxCounts.forEach((count, i) => {
    if (count === 0) return;
    const row = table.insertRow();
    row.innerHTML = `
      <td><span class="box-dot" style="background:${BOX_COLORS[i]}"></span>קופסה ${i + 1}</td>
      <td>${count} פרחים</td>
      <td>${BOX_LABELS[i]}</td>`;
  });

  document.getElementById('summary').style.display = 'block';
}

document.getElementById('restart-btn').addEventListener('click', () => {
  document.getElementById('summary').style.display = 'none';
  showCollectionPicker();
});

(async () => {
  try {
    const resp = await fetch('../collections.json');
    if (!resp.ok) throw new Error('לא ניתן לטעון את רשימת הקולקציות');
    allCollections = await resp.json();

    document.getElementById('loading').style.display = 'none';

    const saved = localStorage.getItem(USER_KEY);
    if (saved) {
      currentUser = saved;
      currentUserData = await loadUserData(currentUser);
      showCollectionPicker();
    } else {
      await showLogin();
    }
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    const errEl = document.getElementById('error');
    errEl.style.display = 'block';
    errEl.innerHTML = `<strong>שגיאה:</strong> ${e.message}`;
  }
})();
</script>
