<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>זיכרון תמונות</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖼️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', 'Segoe UI', Arial, sans-serif;
    background: #f3f8f1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px;
    color: #1a1a1a;
    direction: rtl;
    text-align: right;
  }

  /* ── Login screen ── */
  #login-screen {
    display: none;
    width: 100%;
    max-width: 400px;
    margin-top: 80px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    padding: 40px 32px;
    text-align: center;
  }
  #login-screen h1 { font-size: 2rem; color: #2d6a4f; margin-bottom: 20px; }
  #user-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; width: 100%; }
  .user-btn {
    width: 100%;
    padding: 14px 16px;
    background: #f0f7ee;
    border: 2px solid #c8e6c9;
    border-radius: 12px;
    font-size: 1.1rem;
    font-family: inherit;
    color: #1b4332;
    cursor: pointer;
    text-align: right;
    direction: rtl;
    transition: background 0.15s, border-color 0.15s;
  }
  .user-btn:hover { background: #d4edda; border-color: #2d6a4f; }
  .user-btn { display: flex; justify-content: space-between; align-items: center; }
  .user-name { font-weight: bold; }
  .user-stats { font-size: 0.78rem; color: #555; font-weight: normal; direction: rtl; }
  #add-user-btn {
    width: 100%;
    padding: 11px;
    background: none;
    border: 2px dashed #aaa;
    border-radius: 12px;
    font-size: 0.95rem;
    font-family: inherit;
    color: #777;
    cursor: pointer;
    margin-top: 4px;
    transition: border-color 0.15s, color 0.15s;
  }
  #add-user-btn:hover { border-color: #2d6a4f; color: #2d6a4f; }
  #new-user-form { width: 100%; margin-bottom: 8px; }
  #login-screen input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #ddd;
    border-radius: 12px;
    font-size: 1.1rem;
    font-family: inherit;
    text-align: right;
    direction: rtl;
    margin-bottom: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  #login-screen input:focus { border-color: #2d6a4f; }
  #login-btn {
    width: 100%;
    padding: 12px;
    background: #2d6a4f;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  #login-btn:hover { background: #1b4332; }

  /* ── Header ── */
  header {
    width: 100%;
    max-width: 720px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 18px;
    margin-bottom: 12px;
    direction: rtl;
  }
  .header-main {
    display: grid;
    gap: 4px;
    min-width: 0;
  }
  .header-title-row {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }
  h1 {
    font-size: clamp(1.45rem, 3vw, 2.15rem);
    line-height: 1.05;
    color: #2d6a4f;
    white-space: nowrap;
  }
  #score-box {
    background: #2d6a4f;
    color: #fff;
    border-radius: 24px;
    padding: 10px 22px;
    font-size: 1.05rem;
    font-weight: bold;
    min-width: 110px;
    text-align: center;
    box-shadow: 0 8px 24px rgba(45, 106, 79, 0.18);
    flex-shrink: 0;
  }
  #user-tag {
    font-size: 0.95rem;
    color: #555;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    min-width: 0;
  }
  #username-label {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: min(46vw, 360px);
  }
  .header-action {
    min-height: 34px;
    padding: 5px 12px;
    border-radius: 999px;
    border: 1px solid #b9d8c6;
    background: #fff;
    color: #2d6a4f;
    cursor: pointer;
    font-size: 0.84rem;
    font-weight: 700;
    font-family: inherit;
    line-height: 1;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }
  .header-action:hover { background: #e8f5e0; border-color: #2d6a4f; }
  .header-action:active { transform: translateY(1px); }
  #report-user {
    width: 34px;
    padding: 5px;
  }
  #change-collection {
    width: 34px;
    padding: 5px;
  }
  #change-collection svg {
    width: 18px;
    height: 18px;
    display: block;
    margin: auto;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ── Progress text ── */
  #progress {
    font-size: 0.95rem;
    color: #555;
    margin-bottom: 10px;
    text-align: right;
    width: 100%;
    max-width: 720px;
  }

  /* ── Game card ── */
  #card {
    width: 100%;
    max-width: 720px;
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 16px 44px rgba(27, 67, 50, 0.11);
    overflow: hidden;
  }
  #photo {
    width: 100%;
    aspect-ratio: 16 / 8.2;
    height: auto;
    max-height: 420px;
    object-fit: contain;
    background: #f0f7ee;
    display: block;
  }
  #question {
    padding: 18px 24px 6px;
    font-size: 1.28rem;
    font-weight: bold;
    color: #2d6a4f;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #box-badge {
    font-size: 0.9rem;
    background: #e8f5e0;
    color: #2d6a4f;
    border-radius: 999px;
    padding: 4px 12px;
    font-weight: 700;
    white-space: nowrap;
  }

  /* ── Choices ── */
  #answer-panel {
    display: block;
  }
  #choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 16px 24px 24px;
    direction: rtl;
  }
  .choice {
    min-height: 92px;
    background: #fbfbfb;
    border: 2px solid #d9d9d9;
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    text-align: center;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    user-select: none;
    font-family: inherit;
    color: #1a1a1a;
  }
  .choice:hover:not(.disabled) { border-color: #2d6a4f; background: #e8f5e0; transform: translateY(-1px); }
  .choice .he { font-size: 1.18rem; font-weight: 900; line-height: 1.25; direction: rtl; }
  .choice .en { font-size: 0.98rem; color: #777; margin-top: 5px; direction: ltr; line-height: 1.2; }
  .choice.photo-choice {
    min-height: 132px;
    padding: 8px;
  }
  .choice-img {
    display: block;
    width: 100%;
    height: 112px;
    object-fit: contain;
    background: #f0f7ee;
    border-radius: 8px;
  }
  .choice.correct { background: #d4edda; border-color: #28a745; }
  .choice.wrong   { background: #f8d7da; border-color: #dc3545; }
  .choice.reveal  { background: #d4edda; border-color: #28a745; }
  .choice.disabled { cursor: default; }
  .choice:disabled { cursor: default; }

  /* ── Info box ── */
  #info-box {
    display: none;
    margin: 0 20px 12px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #c8e6c9;
    background: #f0f7ee;
  }
  #info-img {
    width: 100%;
    aspect-ratio: 16 / 8.2;
    height: auto;
    max-height: 220px;
    object-fit: contain;
    background: #f0f7ee;
    display: block;
  }
  #info-text {
    padding: 10px 14px;
    font-size: 0.88rem;
    color: #333;
    line-height: 1.6;
    text-align: right;
    direction: rtl;
    border-top: 4px solid #2d6a4f;
  }

  /* ── Next button ── */
  #next-btn {
    display: none;
    margin: 0 20px 20px;
    width: calc(100% - 40px);
    padding: 12px;
    background: #2d6a4f;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  #next-btn:hover { background: #1b4332; }
  #card.answered #answer-panel {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(240px, 0.72fr);
    gap: 14px;
    padding: 14px 20px 14px;
    align-items: start;
  }
  #card.answered #choices {
    grid-template-columns: 1fr;
    gap: 8px;
    padding: 0;
  }
  #card.answered .choice {
    min-height: 70px;
    padding: 10px 12px;
  }
  #card.answered .choice.hidden-after-answer {
    display: none;
  }
  #card.answered #info-box { margin: 0; }
  #card.answered #info-img { max-height: 150px; }
  #card.answered #info-text {
    font-size: 0.84rem;
    line-height: 1.45;
  }
  #card.answered #next-btn {
    position: fixed;
    left: 50%;
    bottom: max(12px, env(safe-area-inset-bottom));
    transform: translateX(-50%);
    z-index: 20;
    width: calc(100% - 40px);
    max-width: 680px;
    margin: 0 auto;
    box-shadow: 0 10px 28px rgba(27, 67, 50, 0.22);
  }

  /* ── Summary screen ── */
  #summary {
    display: none;
    width: 100%;
    max-width: 720px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    padding: 32px 24px;
    text-align: center;
  }
  #summary h2 { font-size: 1.8rem; color: #2d6a4f; margin-bottom: 6px; }
  #summary .final-score { font-size: 2.8rem; font-weight: bold; color: #1b4332; margin: 12px 0; }
  #summary p { color: #555; margin-bottom: 20px; }

  .progress-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 24px;
    font-size: 0.9rem;
    direction: rtl;
    text-align: right;
  }
  .progress-table th {
    background: #e8f5e0;
    color: #2d6a4f;
    padding: 8px 12px;
    font-weight: bold;
  }
  .progress-table td { padding: 7px 12px; border-bottom: 1px solid #eee; }
  .progress-table tr:last-child td { border-bottom: none; }
  .box-dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    margin-left: 6px;
  }

  #restart-btn {
    padding: 12px 32px;
    background: #2d6a4f;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
  }
  #restart-btn:hover { background: #1b4332; }

  /* ── Collection screen ── */
  #collection-screen {
    display: none;
    width: 100%;
    max-width: 960px;
    margin-top: 80px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    padding: 40px 32px;
    text-align: center;
  }
  .collection-header-row {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 12px;
  }
  #collection-screen h1 { font-size: 2rem; color: #2d6a4f; margin-bottom: 0; }
  #switch-user-from-home {
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
  }
  #collection-welcome { font-size: 1rem; color: #555; margin-bottom: 20px; }
  #picker-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 0.8fr;
    gap: 18px;
    width: 100%;
    margin-bottom: 18px;
  }
  .picker-section {
    width: 100%;
    text-align: right;
  }
  .picker-section h2 {
    font-size: 0.92rem;
    color: #777;
    margin-bottom: 8px;
    font-weight: 700;
  }
  #collection-list,
  #game-mode-list,
  #question-count-list { display: flex; flex-direction: column; gap: 10px; width: 100%; }
  .collection-btn,
  .game-mode-btn,
  .question-count-btn {
    width: 100%;
    padding: 14px 16px;
    background: #f0f7ee;
    border: 2px solid #c8e6c9;
    border-radius: 12px;
    font-size: 1.1rem;
    font-family: inherit;
    color: #1b4332;
    cursor: pointer;
    text-align: center;
    direction: rtl;
    transition: background 0.15s, border-color 0.15s;
  }
  .game-mode-btn {
    display: grid;
    gap: 4px;
    text-align: right;
  }
  .game-mode-title { font-weight: 900; }
  .game-mode-desc { font-size: 0.84rem; color: #666; font-weight: 400; line-height: 1.35; }
  .collection-btn:hover,
  .game-mode-btn:hover,
  .question-count-btn:hover { background: #d4edda; border-color: #2d6a4f; }
  .collection-btn.selected,
  .game-mode-btn.selected,
  .question-count-btn.selected { border-color: #2d6a4f; background: #e8f5e0; font-weight: bold; }
  #custom-question-count {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid #c8e6c9;
    border-radius: 12px;
    font-size: 1rem;
    font-family: inherit;
    color: #1b4332;
    text-align: center;
    direction: ltr;
    outline: none;
    margin-top: 10px;
  }
  #custom-question-count:focus {
    border-color: #2d6a4f;
    background: #f0f7ee;
  }
  #start-game {
    width: 100%;
    padding: 12px;
    background: #2d6a4f;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
    margin-bottom: 10px;
  }
  #start-game:disabled {
    opacity: 0.55;
    cursor: default;
  }
  #start-game:not(:disabled):hover { background: #1b4332; }

  /* ── Home button ── */
/* ── Loading / error ── */
  #loading { margin-top: 60px; font-size: 1.2rem; color: #2d6a4f; }
  #error {
    display: none;
    margin-top: 60px;
    color: #dc3545;
    text-align: center;
    max-width: 400px;
  }

  /* ── Report modal ── */
  #report-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    justify-content: center;
    align-items: flex-start;
    padding: 24px 16px;
    overflow-y: auto;
  }
  #report-overlay.open { display: flex; }
  #report-box {
    background: #fff;
    border-radius: 20px;
    width: 100%;
    max-width: 520px;
    padding: 28px 24px;
    direction: rtl;
  }
  #report-box h2 { font-size: 1.4rem; color: #2d6a4f; margin-bottom: 4px; }
  #report-box .report-meta { font-size: 0.85rem; color: #777; margin-bottom: 20px; }
  #report-close {
    float: left;
    background: none;
    border: none;
    font-size: 1.4rem;
    cursor: pointer;
    color: #aaa;
    line-height: 1;
  }
  #report-close:hover { color: #333; }
  .report-section { margin-bottom: 18px; }
  .report-section h3 { font-size: 0.85rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .report-flower-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 0.9rem;
  }
  .report-flower-row:last-child { border-bottom: none; }
  .report-flower-name { flex: 1; }
  .report-flower-acc { color: #888; font-size: 0.8rem; margin-left: 10px; }
  .report-btn {
    background: none;
    border: none;
    font-size: 0.85rem;
    cursor: pointer;
    color: #2d6a4f;
    padding: 2px 6px;
    opacity: 0.7;
    flex-shrink: 0;
  }
  .report-btn:hover { opacity: 1; }

  @media (max-width: 640px) {
    body { padding: 12px; }
    header {
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }
    h1 { font-size: 1.3rem; }
    #score-box {
      min-width: 82px;
      padding: 8px 12px;
      font-size: 0.92rem;
      border-radius: 18px;
    }
    #user-tag {
      gap: 6px;
      font-size: 0.84rem;
    }
    #username-label { max-width: 100%; flex-basis: 100%; }
    .header-action {
      min-height: 30px;
      padding: 4px 9px;
      font-size: 0.76rem;
    }
    #report-user { width: 30px; }
    #change-collection { width: 30px; }
    #collection-screen {
      margin-top: 36px;
      padding: 28px 18px;
    }
    .collection-header-row {
      justify-content: space-between;
      gap: 10px;
    }
    #collection-screen h1 { font-size: 1.5rem; }
    #picker-grid {
      grid-template-columns: 1fr;
      gap: 16px;
    }
    #switch-user-from-home {
      position: static;
      transform: none;
      flex-shrink: 0;
    }
    #progress { font-size: 0.86rem; }
    #card { border-radius: 14px; }
    #photo {
      aspect-ratio: 4 / 3;
      max-height: min(48vh, 420px);
    }
    #question {
      align-items: flex-start;
      gap: 8px;
      padding: 14px 16px 2px;
      font-size: 1.08rem;
    }
    #box-badge { font-size: 0.78rem; padding: 3px 9px; }
    #choices {
      grid-template-columns: 1fr;
      gap: 9px;
      padding: 12px 16px 16px;
    }
    .choice {
      min-height: 72px;
      padding: 11px 12px;
    }
    .choice.photo-choice { min-height: 104px; }
    .choice-img { height: 88px; }
    .choice .he { font-size: 1.02rem; }
    .choice .en { font-size: 0.88rem; }
    #info-img { max-height: 140px; }
    #info-text {
      padding: 8px 12px;
      font-size: 0.82rem;
      line-height: 1.45;
    }
    #card.answered #photo { max-height: min(34vh, 300px); }
    #card.answered #answer-panel {
      grid-template-columns: 1fr;
      gap: 8px;
      padding: 10px 16px 12px;
    }
    #card.answered .choice {
      min-height: 48px;
      padding: 7px 10px;
    }
    #card.answered .choice .he { font-size: 0.95rem; }
    #card.answered .choice .en { display: none; }
    #card.answered #info-img { display: none !important; }
    #next-btn {
      margin-bottom: 12px;
      padding: 10px;
    }
    #card.answered #next-btn { width: calc(100% - 32px); }
  }
</style>
</head>
<body>

<div id="loading">טוען תמונות... 🖼️</div>
<div id="error"></div>

<!-- Report modal -->
<div id="report-overlay">
  <div id="report-box">
    <button id="report-close">✕</button>
    <h2 id="report-username"></h2>
    <div class="report-meta" id="report-meta"></div>
    <div id="report-sections"></div>
  </div>
</div>

<!-- Login -->
<div id="login-screen">
  <h1>🖼️ זיכרון תמונות</h1>
  <div id="user-list"></div>
  <div id="new-user-form" style="display:none">
    <input id="name-input" type="text" placeholder="השם שלך" maxlength="30">
    <button id="login-btn">כניסה</button>
  </div>
  <button id="add-user-btn">+ משתמש חדש</button>
</div>

<!-- Collection picker -->
<div id="collection-screen">
  <div class="collection-header-row">
    <h1>🖼️ זיכרון תמונות</h1>
    <button id="switch-user-from-home" class="header-action">שנה משתמש</button>
  </div>
  <p id="collection-welcome"></p>
  <div id="picker-grid">
    <div class="picker-section">
      <h2>אוסף</h2>
      <div id="collection-list"></div>
    </div>
    <div class="picker-section">
      <h2>מצב משחק</h2>
      <div id="game-mode-list"></div>
    </div>
    <div class="picker-section">
      <h2>מספר שאלות</h2>
      <div id="question-count-list"></div>
      <input id="custom-question-count" type="number" min="1" step="1" inputmode="numeric" placeholder="מספר אחר">
    </div>
  </div>
  <button id="start-game">התחל משחק</button>
</div>

<!-- Game -->
<header id="header" style="display:none">
  <div class="header-main">
    <div class="header-title-row">
      <h1>זיכרון תמונות 🖼️</h1>
    </div>
    <div id="user-tag">
      <span id="username-label"></span>
      <button id="report-user" class="header-action" title="דוח התקדמות" aria-label="דוח התקדמות">📊</button>
      <button id="change-collection" class="header-action" title="שנה משחק" aria-label="שנה משחק">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 11.5 12 4l9 7.5"></path>
          <path d="M5 10.5V20h14v-9.5"></path>
          <path d="M9.5 20v-6h5v6"></path>
        </svg>
      </button>
      <button id="switch-user" class="header-action">שנה משתמש</button>
    </div>
  </div>
  <div id="score-box">ניקוד: <span id="score">0</span></div>
</header>

<div id="progress" style="display:none"></div>

<div id="card" style="display:none">
  <img id="photo" src="" alt="תמונה">
  <div id="question">
    <span id="question-text">מה מופיע בתמונה?</span>
    <span id="box-badge"></span>
  </div>
  <div id="answer-panel">
    <div id="choices"></div>
    <div id="info-box">
      <img id="info-img" src="" alt="">
      <div id="info-text"></div>
    </div>
  </div>
  <button id="next-btn">הבא ◀</button>
</div>

<!-- Summary -->
<div id="summary">
  <h2>סיום! 🎉</h2>
  <div class="final-score"><span id="final-score"></span></div>
  <p id="summary-text"></p>
  <table class="progress-table" id="progress-table">
    <tr>
      <th>קופסה</th>
      <th id="progress-item-label">פרחים</th>
      <th>מתי חוזר</th>
    </tr>
  </table>
  <button id="restart-btn">משחק נוסף</button>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
import { firebaseConfig } from './firebase-config.js';

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

async function loadUserData(name) {
  const snap = await getDoc(doc(db, 'users', name));
  if (!snap.exists()) return { collections: {}, lastCollection: null };
  const data = snap.data();
  // Migrate old format: { sessionCount, flowers } → { collections: { flowers1: ... } }
  if (data.flowers && !data.collections) {
    return {
      collections: { flowers1: { sessionCount: data.sessionCount || 0, flowers: data.flowers } },
      lastCollection: 'flowers1'
    };
  }
  if (!data.collections) data.collections = {};
  return data;
}

async function saveUserData(name, userData) {
  await setDoc(doc(db, 'users', name), userData);
}

const USER_KEY   = 'flowers_current_user';
const BOX_COLORS = ['#dc3545','#fd7e14','#ffc107','#20c997','#2d6a4f'];
const BOX_LABELS = ['כל משחק','כל 2 משחקים','כל 4 משחקים','כל 8 משחקים','כל 16 משחקים'];
const BOX_NAMES  = ['חדש','מתחיל','מכיר','טוב','שולט!'];
const PHOTO_PLACEHOLDER = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450"%3E%3Crect width="800" height="450" fill="%23f0f7ee"/%3E%3Ctext x="400" y="230" text-anchor="middle" font-family="Arial,sans-serif" font-size="34" fill="%232d6a4f"%3EPhoto unavailable%3C/text%3E%3C/svg%3E';
const DEFAULT_GAME_MODE = 'image-to-name';
const DEFAULT_QUESTION_COUNT = 20;
const GAME_MODES = [
  {
    id: 'image-to-name',
    name: 'תמונה ← שם',
    description: 'מזהים את השם לפי התמונה'
  },
  {
    id: 'name-to-image',
    name: 'שם ← תמונה',
    description: 'בוחרים את התמונה שמתאימה לשם'
  }
];
const QUESTION_COUNT_OPTIONS = [
  { value: 10, label: '10 שאלות' },
  { value: 20, label: '20 שאלות' },
  { value: 50, label: '50 שאלות' },
  { value: 'all', label: 'כל השאלות' }
];

let allCollections  = [];
let currentCollection = null;
let allFlowers      = [];
let sessionQueue    = [];
let currentIdx      = 0;
let sessionScore    = 0;
let currentUser     = null;
let currentUserData = null;
let currentGameMode = DEFAULT_GAME_MODE;
let currentQuestionCount = DEFAULT_QUESTION_COUNT;

const regionNamesHe = new Intl.DisplayNames(['he'], { type: 'region' });
const regionNamesEn = new Intl.DisplayNames(['en'], { type: 'region' });

function getCollectionState(userData) {
  const id = currentCollection.id;
  if (!userData.collections[id]) {
    userData.collections[id] = { sessionCount: 0, flowers: {} };
  }
  return userData.collections[id];
}

function itemKey(item) {
  return item.file || item.id || item.code || item.photo_url || item.name_en || item.name_he || item.sci_name;
}

function collectionItemLabel() {
  return currentCollection.itemLabel || 'פרחים';
}

function getFlowerState(userData, key) {
  const col = getCollectionState(userData);
  if (!col.flowers[key]) {
    col.flowers[key] = { box: 1, lastSession: -999, correct: 0, total: 0 };
  }
  return col.flowers[key];
}

function isDue(state, sessionCount) {
  const interval = Math.pow(2, state.box - 1);
  return (sessionCount - state.lastSession) >= interval;
}

function selectedQuestionLimit() {
  return currentQuestionCount === 'all' ? allFlowers.length : Math.min(Number(currentQuestionCount), allFlowers.length);
}

function normalizeQuestionCount(value) {
  if (value === 'all') return value;
  const count = Number(value);
  return Number.isInteger(count) && count > 0 ? count : DEFAULT_QUESTION_COUNT;
}

function buildSessionQueue(userData) {
  const limit = selectedQuestionLimit();

  const sc = getCollectionState(userData).sessionCount;
  let due = allFlowers.filter(f => isDue(getFlowerState(userData, itemKey(f)), sc));

  if (due.length < limit) {
    const notDue = allFlowers
      .filter(f => !due.includes(f))
      .sort((a, b) => {
        const sa = getFlowerState(userData, itemKey(a));
        const sb = getFlowerState(userData, itemKey(b));
        return sa.box - sb.box || (sc - sb.lastSession) - (sc - sa.lastSession);
      });
    due = due.concat(notDue.slice(0, limit - due.length));
  }
  return shuffle([...due]).slice(0, limit);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function answerKey(flower) {
  return (flower.name_he || flower.name_en || flower.sci_name || '').trim();
}

function getOptions(correct) {
  const correctKey = answerKey(correct);
  const uniquePool = new Map();

  shuffle([...allFlowers]).forEach(flower => {
    const key = answerKey(flower);
    if (!key || key === correctKey || uniquePool.has(key)) return;
    uniquePool.set(key, flower);
  });

  return shuffle([...Array.from(uniquePool.values()).slice(0, 3), correct]);
}

function setItemImage(img, item) {
  const fallbackSrc = item.flag_emoji ? flagEmojiSrc(item.flag_emoji) : (item.photo_url || PHOTO_PLACEHOLDER);

  if (!item.file) {
    img.onerror = null;
    img.src = fallbackSrc;
    return;
  }

  const localSrc = '../' + item.file;

  img.onerror = () => {
    img.onerror = () => {
      img.onerror = null;
      img.src = PHOTO_PLACEHOLDER;
    };
    img.src = fallbackSrc;
  };
  img.src = localSrc;
}

function setQuestionPhoto(flower) {
  const photo = document.getElementById('photo');
  photo.style.display = 'block';
  setItemImage(photo, flower);
}

function hideQuestionPhoto() {
  const photo = document.getElementById('photo');
  photo.onerror = null;
  photo.removeAttribute('src');
  photo.style.display = 'none';
}

function itemDisplayName(item) {
  return `${item.name_he || item.name_en || item.sci_name}${item.name_en ? ` / ${item.name_en}` : ''}`;
}

function itemQuestionText(item) {
  if (currentGameMode === 'name-to-image') return `בחר תמונה: ${itemDisplayName(item)}`;
  return currentCollection.question || 'מה מופיע בתמונה?';
}

function choiceMarkup(opt) {
  if (currentGameMode === 'name-to-image') return '<img class="choice-img" alt="">';
  return `<div class="he">${opt.name_he}</div><div class="en">${opt.name_en}</div>`;
}

function configureChoiceMedia(btn, opt) {
  if (currentGameMode !== 'name-to-image') return;
  btn.classList.add('photo-choice');
  const img = btn.querySelector('.choice-img');
  img.alt = opt.name_he || opt.name_en || '';
  setItemImage(img, opt);
}

function setInfoImage(item) {
  const infoImg = document.getElementById('info-img');
  if (item.photo_url || item.flag_emoji || item.file) {
    setItemImage(infoImg, item);
    infoImg.style.display = 'block';
  } else {
    infoImg.style.display = 'none';
  }
}

function countryCodeToFlagEmoji(code) {
  return code
    .toUpperCase()
    .replace(/./g, char => String.fromCodePoint(127397 + char.charCodeAt()));
}

function flagEmojiSrc(emoji) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450"><rect width="800" height="450" fill="#f7faf7"/><text x="400" y="292" text-anchor="middle" font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif" font-size="245">${emoji}</text></svg>`;
  return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
}

function normalizeItem(item) {
  if (!item.code) return item;
  const code = item.code.toUpperCase();
  const nameHe = regionNamesHe.of(code);
  const nameEn = regionNamesEn.of(code);
  return {
    ...item,
    id: item.id || `flag-${code.toLowerCase()}`,
    flag_emoji: item.flag_emoji || countryCodeToFlagEmoji(code),
    name_he: item.name_he || nameHe || code,
    name_en: item.name_en || nameEn || code,
    sci_name: item.sci_name || nameEn || code,
    info: item.info || `דגל ${nameHe || code}.`
  };
}

function collectionsDataFrom(raw) {
  if (raw.collections) return raw.collections;
  if (raw.flowers) return { flowers1: { sessionCount: raw.sessionCount || 0, flowers: raw.flowers } };
  return {};
}

function showReport(username, data) {
  document.getElementById('report-username').textContent = username;
  const sections = document.getElementById('report-sections');
  sections.innerHTML = '';

  if (currentCollection && allFlowers.length > 0) {
    // In-game: detailed per-flower report for current collection
    const colData = (data.collections || {})[currentCollection.id] || { sessionCount: 0, flowers: {} };
    const flowers  = colData.flowers;
    document.getElementById('report-meta').textContent =
      `${colData.sessionCount || 0} משחקים · ${Object.keys(flowers).length} ${collectionItemLabel()} נראו · ${currentCollection.name}`;

    const byBox = {1:[], 2:[], 3:[], 4:[], 5:[]};
    allFlowers.forEach(f => {
      const s = flowers[itemKey(f)];
      if (!s) return;
      byBox[s.box].push({ name: f.name_he, correct: s.correct, total: s.total });
    });
    [5,4,3,2,1].forEach(box => {
      const items = byBox[box];
      if (!items.length) return;
      const sec = document.createElement('div');
      sec.className = 'report-section';
      sec.innerHTML = `<h3><span class="box-dot" style="background:${BOX_COLORS[box-1]}"></span>${BOX_NAMES[box-1]} — קופסה ${box}</h3>`;
      items.forEach(item => {
        const pct = item.total ? Math.round((item.correct / item.total) * 100) : 0;
        const row = document.createElement('div');
        row.className = 'report-flower-row';
        row.innerHTML = `<span class="report-flower-name">${item.name}</span>
          <span class="report-flower-acc">${item.correct}/${item.total} (${pct}%)</span>`;
        sec.appendChild(row);
      });
      sections.appendChild(sec);
    });
  } else {
    // Login screen: summary per collection
    const cols = collectionsDataFrom(data);
    const total = Object.values(cols).reduce((s, c) => s + (c.sessionCount || 0), 0);
    document.getElementById('report-meta').textContent = `${total} משחקים סה"כ`;
    allCollections.forEach(col => {
      const colData = cols[col.id];
      if (!colData) return;
      const flowers  = colData.flowers || {};
      const mastered = Object.values(flowers).filter(f => f.box === 5).length;
      const sec = document.createElement('div');
      sec.className = 'report-section';
      sec.innerHTML = `<h3>${col.name}</h3>
        <div style="font-size:0.9rem;color:#555;padding:4px 0">${colData.sessionCount || 0} משחקים · ${mastered}/${Object.keys(flowers).length} שולט!</div>`;
      sections.appendChild(sec);
    });
  }

  document.getElementById('report-overlay').classList.add('open');
}

document.getElementById('report-close').addEventListener('click', () => {
  document.getElementById('report-overlay').classList.remove('open');
});
document.getElementById('report-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('report-overlay'))
    document.getElementById('report-overlay').classList.remove('open');
});

function resetToLogin() {
  localStorage.removeItem(USER_KEY);
  currentUser = null;
  currentUserData = null;
  currentCollection = null;
  ['header', 'card', 'progress', 'summary', 'collection-screen'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
  document.getElementById('name-input').value = '';
  document.getElementById('new-user-form').style.display = 'none';
  document.getElementById('add-user-btn').style.display = 'block';
}

async function showLogin() {
  document.getElementById('login-screen').style.display = 'block';

  const list = document.getElementById('user-list');
  list.innerHTML = '<div style="color:#aaa;font-size:0.9rem;padding:8px 0">טוען משתמשים...</div>';

  const snap = await getDocs(collection(db, 'users'));
  list.innerHTML = '';
  snap.docs
    .sort((a, b) => a.id.localeCompare(b.id))
    .forEach(d => {
      const cols = collectionsDataFrom(d.data());
      const totalSessions = Object.values(cols).reduce((s, c) => s + (c.sessionCount || 0), 0);
      const allFlowersSeen = new Set(Object.values(cols).flatMap(c => Object.keys(c.flowers || {})));
      const allMastered    = Object.values(cols).reduce((s, c) =>
        s + Object.values(c.flowers || {}).filter(f => f.box === 5).length, 0);

      const row = document.createElement('div');
      row.style.cssText = 'display:flex;gap:8px;align-items:stretch;';

      const btn = document.createElement('button');
      btn.className = 'user-btn';
      btn.style.cssText = 'flex:1;width:auto;';
      btn.innerHTML = `
        <span class="user-name">${d.id}</span>
        <span class="user-stats">${totalSessions} משחקים · ${allMastered}/${allFlowersSeen.size} שולט!</span>
      `;
      btn.addEventListener('click', () => doLogin(d.id).catch(console.error));

      const reportBtn = document.createElement('button');
      reportBtn.className = 'report-btn';
      reportBtn.title = 'דוח מפורט';
      reportBtn.textContent = '📊';
      reportBtn.style.cssText = 'border:2px solid #c8e6c9;border-radius:12px;background:#f0f7ee;padding:0 12px;font-size:1.1rem;cursor:pointer;';
      reportBtn.addEventListener('click', () => showReport(d.id, d.data()));

      row.appendChild(btn);
      row.appendChild(reportBtn);
      list.appendChild(row);
    });
}

document.getElementById('add-user-btn').addEventListener('click', () => {
  document.getElementById('new-user-form').style.display = 'block';
  document.getElementById('add-user-btn').style.display = 'none';
  document.getElementById('name-input').focus();
});

async function doLogin(name) {
  name = name.trim();
  if (!name) return;
  localStorage.setItem(USER_KEY, name);
  currentUser = name;
  document.getElementById('login-screen').style.display = 'none';
  currentUserData = await loadUserData(currentUser);
  showCollectionPicker();
}

document.getElementById('login-btn').addEventListener('click', () => {
  doLogin(document.getElementById('name-input').value).catch(console.error);
});
document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin(document.getElementById('name-input').value).catch(console.error);
});
document.getElementById('report-user').addEventListener('click', () => {
  showReport(currentUser, currentUserData);
});
document.getElementById('change-collection').addEventListener('click', () => {
  ['header', 'card', 'progress', 'summary'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
  showCollectionPicker();
});
function switchToLogin() {
  resetToLogin();
  showLogin().catch(console.error);
}
document.getElementById('switch-user').addEventListener('click', switchToLogin);
document.getElementById('switch-user-from-home').addEventListener('click', switchToLogin);

function showCollectionPicker() {
  document.getElementById('collection-screen').style.display = 'block';
  document.getElementById('collection-welcome').style.color = '#555';
  document.getElementById('collection-welcome').textContent = `שלום, ${currentUser}! בחר משחק:`;

  const lastCol = currentUserData ? currentUserData.lastCollection : null;
  const lastMode = currentUserData ? currentUserData.lastGameMode : null;
  const lastQuestionCount = currentUserData ? currentUserData.lastQuestionCount : null;
  currentCollection = allCollections.find(col => col.id === lastCol) || allCollections[0] || null;
  currentGameMode = GAME_MODES.some(mode => mode.id === lastMode) ? lastMode : DEFAULT_GAME_MODE;
  currentQuestionCount = normalizeQuestionCount(lastQuestionCount || DEFAULT_QUESTION_COUNT);

  const collectionList = document.getElementById('collection-list');
  const modeList = document.getElementById('game-mode-list');
  const questionCountList = document.getElementById('question-count-list');
  const customQuestionCount = document.getElementById('custom-question-count');
  const startBtn = document.getElementById('start-game');
  const isPresetQuestionCount = QUESTION_COUNT_OPTIONS.some(option => option.value === currentQuestionCount);
  customQuestionCount.value = !isPresetQuestionCount && currentQuestionCount !== 'all'
    ? currentQuestionCount
    : '';

  function renderSelection() {
    collectionList.querySelectorAll('.collection-btn').forEach(btn => {
      btn.classList.toggle('selected', btn.dataset.collectionId === (currentCollection && currentCollection.id));
    });
    modeList.querySelectorAll('.game-mode-btn').forEach(btn => {
      btn.classList.toggle('selected', btn.dataset.modeId === currentGameMode);
    });
    questionCountList.querySelectorAll('.question-count-btn').forEach(btn => {
      btn.classList.toggle('selected', btn.dataset.questionCount === String(currentQuestionCount));
    });
    startBtn.disabled = !(currentCollection && currentGameMode && currentQuestionCount);
  }

  collectionList.innerHTML = '';
  allCollections.forEach(col => {
    const isLast = col.id === lastCol;
    const btn = document.createElement('button');
    btn.className = 'collection-btn';
    btn.dataset.collectionId = col.id;
    btn.textContent = col.name + (isLast ? ' ★' : '');
    btn.addEventListener('click', () => {
      currentCollection = col;
      renderSelection();
    });
    collectionList.appendChild(btn);
  });

  modeList.innerHTML = '';
  GAME_MODES.forEach(mode => {
    const isLast = mode.id === lastMode;
    const btn = document.createElement('button');
    btn.className = 'game-mode-btn';
    btn.dataset.modeId = mode.id;
    btn.innerHTML = `
      <span class="game-mode-title">${mode.name}${isLast ? ' ★' : ''}</span>
      <span class="game-mode-desc">${mode.description}</span>
    `;
    btn.addEventListener('click', () => {
      currentGameMode = mode.id;
      renderSelection();
    });
    modeList.appendChild(btn);
  });

  questionCountList.innerHTML = '';
  QUESTION_COUNT_OPTIONS.forEach(option => {
    const isLast = option.value === lastQuestionCount;
    const btn = document.createElement('button');
    btn.className = 'question-count-btn';
    btn.dataset.questionCount = String(option.value);
    btn.textContent = option.label + (isLast ? ' ★' : '');
    btn.addEventListener('click', () => {
      currentQuestionCount = option.value;
      customQuestionCount.value = '';
      renderSelection();
    });
    questionCountList.appendChild(btn);
  });

  customQuestionCount.oninput = () => {
    if (!customQuestionCount.value) {
      currentQuestionCount = null;
      renderSelection();
      return;
    }
    const count = Number(customQuestionCount.value);
    currentQuestionCount = Number.isInteger(count) && count > 0 ? count : null;
    renderSelection();
  };

  startBtn.onclick = () => {
    if (!(currentCollection && currentGameMode && currentQuestionCount)) return;
    document.getElementById('collection-screen').style.display = 'none';
    startSession().catch(err => {
      document.getElementById('loading').style.display = 'none';
      showCollectionPicker();
      document.getElementById('collection-welcome').textContent = `שגיאה: ${err.message}`;
      document.getElementById('collection-welcome').style.color = '#dc3545';
    });
  };

  renderSelection();
}

async function startSession() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('loading').textContent = 'טוען... 🖼️';

  const resp = await fetch('../' + currentCollection.file);
  if (!resp.ok) throw new Error('לא ניתן לטעון את האוסף');
  allFlowers = (await resp.json()).map(normalizeItem);
  if (allFlowers.length < 4) throw new Error(`צריך לפחות 4 ${collectionItemLabel()} כדי לשחק`);

  currentUserData = await loadUserData(currentUser);
  currentUserData.lastCollection = currentCollection.id;
  currentUserData.lastGameMode = currentGameMode;
  currentUserData.lastQuestionCount = currentQuestionCount;
  const colState = getCollectionState(currentUserData);
  colState.sessionCount++;
  await saveUserData(currentUser, currentUserData);

  sessionQueue = buildSessionQueue(currentUserData);
  currentIdx   = 0;
  sessionScore = 0;

  document.getElementById('loading').style.display = 'none';
  document.getElementById('username-label').textContent = `${currentUser} · ${currentCollection.name}`;
  document.getElementById('score').textContent = '0';
  document.getElementById('header').style.display = 'flex';
  document.getElementById('progress').style.display = 'block';
  document.getElementById('card').style.display = 'block';
  document.getElementById('summary').style.display = 'none';
  showQuestion();
}

function showQuestion() {
  const flower = sessionQueue[currentIdx];
  const state  = getFlowerState(currentUserData, itemKey(flower));

  document.getElementById('card').classList.remove('answered');
  document.getElementById('question-text').textContent = itemQuestionText(flower);
  if (currentGameMode === 'name-to-image') hideQuestionPhoto();
  else setQuestionPhoto(flower);
  document.getElementById('progress').textContent =
    `שאלה ${currentIdx + 1} מתוך ${sessionQueue.length}`;
  document.getElementById('box-badge').textContent = `${BOX_NAMES[state.box - 1]} (רמה ${state.box}/5)`;
  document.getElementById('box-badge').style.background = BOX_COLORS[state.box - 1] + '22';
  document.getElementById('box-badge').style.color = BOX_COLORS[state.box - 1];

  const options = getOptions(flower);
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'choice';
    btn.dataset.answerKey = answerKey(opt);
    btn.dataset.isCorrect = opt === flower ? 'true' : 'false';
    btn.innerHTML = choiceMarkup(opt);
    configureChoiceMedia(btn, opt);
    btn.addEventListener('click', () => handleAnswer(btn, opt, flower));
    choicesEl.appendChild(btn);
  });

  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('info-box').style.display = 'none';
  requestAnimationFrame(() => {
    document.getElementById('card').scrollIntoView({ block: 'start' });
  });
}

function handleAnswer(btn, chosen, correct) {
  document.getElementById('card').classList.add('answered');
  document.querySelectorAll('.choice').forEach(b => {
    b.classList.add('disabled');
    b.disabled = true;
  });

  const isCorrect = chosen === correct;

  if (isCorrect) {
    btn.classList.add('correct');
    sessionScore++;
    document.getElementById('score').textContent = sessionScore;
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.choice').forEach(b => {
      if (b.dataset.answerKey === answerKey(correct)) b.classList.add('reveal');
    });
  }

  document.querySelectorAll('.choice').forEach(b => {
    const isSelected = b === btn;
    const isCorrectChoice = b.dataset.isCorrect === 'true';
    if (!isSelected && !isCorrectChoice) b.classList.add('hidden-after-answer');
  });

  const state = getFlowerState(currentUserData, itemKey(correct));
  state.total++;
  if (isCorrect) {
    state.correct++;
    state.box = Math.min(state.box + 1, 5);
  } else {
    state.box = 1;
  }
  state.lastSession = getCollectionState(currentUserData).sessionCount;

  saveUserData(currentUser, currentUserData).catch(console.error);

  const infoBox = document.getElementById('info-box');
  if (correct.info || correct.photo_url || correct.flag_emoji) {
    document.getElementById('info-text').textContent = correct.info || '';
    document.getElementById('info-text').style.display = correct.info ? 'block' : 'none';
    setInfoImage(correct);
    infoBox.style.display = 'block';
  } else {
    infoBox.style.display = 'none';
  }

  document.getElementById('next-btn').style.display = 'block';
}

document.getElementById('next-btn').addEventListener('click', () => {
  currentIdx++;
  if (currentIdx >= sessionQueue.length) showSummary();
  else showQuestion();
});

function showSummary() {
  document.getElementById('card').style.display = 'none';
  document.getElementById('progress').style.display = 'none';

  const total = sessionQueue.length;
  const pct = Math.round((sessionScore / total) * 100);
  document.getElementById('final-score').textContent = `${sessionScore} / ${total}`;
  document.getElementById('summary-text').textContent =
    pct === 100 ? 'מושלם! שליטה מלאה!' :
    pct >= 70  ? 'כל הכבוד! עשית עבודה נהדרת' :
    pct >= 40  ? 'לא רע! כדאי להתאמן עוד קצת' :
               'המשך להתאמן, זה ישתפר ממשחק למשחק';

  const boxCounts = [0, 0, 0, 0, 0];
  allFlowers.forEach(f => {
    const s = getFlowerState(currentUserData, itemKey(f));
    boxCounts[s.box - 1]++;
  });

  const table = document.getElementById('progress-table');
  document.getElementById('progress-item-label').textContent = collectionItemLabel();
  while (table.rows.length > 1) table.deleteRow(1);
  boxCounts.forEach((count, i) => {
    if (count === 0) return;
    const row = table.insertRow();
    row.innerHTML = `
      <td><span class="box-dot" style="background:${BOX_COLORS[i]}"></span>קופסה ${i + 1}</td>
      <td>${count} ${collectionItemLabel()}</td>
      <td>${BOX_LABELS[i]}</td>`;
  });

  document.getElementById('summary').style.display = 'block';
}

document.getElementById('restart-btn').addEventListener('click', () => {
  document.getElementById('summary').style.display = 'none';
  showCollectionPicker();
});

(async () => {
  try {
    const resp = await fetch('../collections.json');
    if (!resp.ok) throw new Error('לא ניתן לטעון את רשימת הקולקציות');
    allCollections = await resp.json();

    document.getElementById('loading').style.display = 'none';

    const saved = localStorage.getItem(USER_KEY);
    if (saved) {
      currentUser = saved;
      currentUserData = await loadUserData(currentUser);
      showCollectionPicker();
    } else {
      await showLogin();
    }
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    const errEl = document.getElementById('error');
    errEl.style.display = 'block';
    errEl.innerHTML = `<strong>שגיאה:</strong> ${e.message}`;
  }
})();
</script>
